name: CD

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env: 
      CHANGELOG: ""
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache: true

      - name: Build binary
        run: go build -v -ldflags "-s -w -X main.version=${{ github.ref_name }}" -o gopac .

      - name: Generate Changelog
        run: |
          # Try to find the previous tag reachable from the parent of the current commit
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          echo "Current ref: $GITHUB_REF_NAME"
          echo "Previous tag: $PREV_TAG"

          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          if [ -z "$PREV_TAG" ]; then
            echo "Initial Release" >> $GITHUB_ENV
            git log --pretty=format:"- %s (%h)" >> $GITHUB_ENV
          else
            echo "## Changes since $PREV_TAG" >> $GITHUB_ENV
            git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD >> $GITHUB_ENV
          fi
          echo "" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gopac
            LICENCE
            completions/gopac.fish
          generate_release_notes: false
          overwrite_files: true
          body: |
            ${{ env.CHANGELOG }}

  aur-publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts
          echo "Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur" > ~/.ssh/config

      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.AUR_USERNAME }}"
          git config --global user.email "${{ secrets.AUR_EMAIL }}"

      - name: Publish to AUR
        run: |
          publish_pkg() {
            local pkgname=$1
            local template=$2
            local is_bin=$3
            
            echo "::group::Publishing $pkgname"
            git clone "aur@aur.archlinux.org:${pkgname}.git" "dist-${pkgname}"
            
            local new_ver="${GITHUB_REF_NAME#v}"
            
            if [ "$is_bin" = "true" ]; then
              # BIN package logic: Fetch checksums from released assets
              local url_bin="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gopac"
              local url_lic="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/LICENCE"
              local url_fish="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gopac.fish"
              
              local sha_bin=$(curl -L "$url_bin" | sha256sum | cut -d' ' -f1)
              local sha_lic=$(curl -L "$url_lic" | sha256sum | cut -d' ' -f1)
              local sha_fish=$(curl -L "$url_fish" | sha256sum | cut -d' ' -f1)
              
              sed -e "s/\${PKGVER}/$new_ver/g" \
                  -e "s/\${SHA256_BIN}/$sha_bin/g" \
                  -e "s/\${SHA256_LIC}/$sha_lic/g" \
                  -e "s/\${SHA256_FISH}/$sha_fish/g" \
                  "$template" > "dist-${pkgname}/PKGBUILD"
            else
              # Source package logic: Fetch checksum from source tarball
              local url="https://github.com/${{ github.repository }}/archive/refs/tags/${{ github.ref_name }}.tar.gz"
              local sha=$(curl -L "$url" | sha256sum | cut -d' ' -f1)
              
              sed -e "s/\${PKGVER}/$new_ver/g" \
                  -e "s/\${SHA256}/$sha/g" \
                  "$template" > "dist-${pkgname}/PKGBUILD"
            fi
            
            cd "dist-${pkgname}"
            # Generate .SRCINFO using Arch Linux container
            docker run --rm -v "$(pwd):/pkg" archlinux:latest bash -c "pacman -Syu --noconfirm --needed base-devel >&2 && useradd -m builduser && cp -r /pkg /tmp/work && chown -R builduser:builduser /tmp/work && su builduser -c 'cd /tmp/work && makepkg --printsrcinfo'" > .SRCINFO
            
            git add PKGBUILD .SRCINFO
            git diff-index --quiet HEAD || git commit -m "Update to ${{ github.ref_name }}"
            git push origin master
            cd ..
            echo "::endgroup::"
          }
          
          publish_pkg "gopac" "distribution/PKGBUILD" "false"
          publish_pkg "gopac-bin" "distribution/PKGBUILD-bin" "true"
